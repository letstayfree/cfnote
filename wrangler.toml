name = "cfnote"
main = "worker/index.ts"
compatibility_date = "2024-12-01"

# 静态资源:非 /api 请求直接由平台服务(免费不限量),未命中路径回退到 SPA 入口
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# 每月 2 日 02:47 UTC 自动归档上月用量(见 worker/archive.ts,未配置统计凭据时自动跳过)
[triggers]
crons = ["47 2 2 * *"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "cfnote-db"
database_id = "3abd7367-e382-41d4-9539-a8db0b368208"

[[vectorize]]
binding = "VECTORIZE"
index_name = "cfnote-index"

[ai]
binding = "AI"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "cfnote_usage"
